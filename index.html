<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ChatGPT自由發揮盲盒</title>
<style>
body { margin:0; overflow:hidden; background:#111; }
span { position:absolute; font-weight:bold; }
</style>
<body>
<script>
const chars="❤";
const coolColors=[180,200,220,250,280,300]; // 冷色系 H
function spawn(){
    const s=document.createElement('span');
    s.textContent=chars;
    let size=70 + Math.random()*130;
    s.style.fontSize=size+'px';
    s.style.color=`hsl(${coolColors[Math.floor(Math.random()*coolColors.length)]},100%,50%)`;
    s.style.opacity=0.75 + Math.random()*0.25;
    document.body.appendChild(s);

    const startEdge = Math.floor(Math.random()*4);
    let x, y, dx, dy;
    switch(startEdge){
        case 0: x=Math.random()*window.innerWidth; y=-size; dx=(Math.random()-0.5)*8; dy=1+Math.random()*4; break;
        case 1: x=Math.random()*window.innerWidth; y=window.innerHeight+size; dx=(Math.random()-0.5)*8; dy=-(1+Math.random()*4); break;
        case 2: x=-size; y=Math.random()*window.innerHeight; dx=1+Math.random()*4; dy=(Math.random()-0.5)*8; break;
        case 3: x=window.innerWidth+size; y=Math.random()*window.innerHeight; dx=-(1+Math.random()*4); dy=(Math.random()-0.5)*8; break;
    }
    s.style.left=x+'px';
    s.style.top=y+'px';

    const anim=setInterval(()=>{
        x+=dx;
        y+=dy;
        size += (Math.random()-0.5)*5;
        if(size<70) size=70;
        if(size>200) size=200;
        s.style.fontSize=size+'px';
        s.style.left=x+'px';
        s.style.top=y+'px';
        if(x<-220 || x>window.innerWidth+220 || y<-220 || y>window.innerHeight+220){
            clearInterval(anim);
            s.remove();
        }
    },30);
}
setInterval(spawn,200);
</script>
</body>
</html>
