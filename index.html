<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ChatGPT自由發揮盲盒</title>
<style>
body { margin:0; overflow:hidden; background:#111; }
span { position:absolute; font-weight:bold; }
</style>
<body>
<script>
const chars="❤";
function spawn(){
    const s=document.createElement('span');
    s.textContent=chars;
    s.style.left=Math.random()*window.innerWidth+'px';
    s.style.top=Math.random()*window.innerHeight+'px';
    const size=10 + Math.random()*25; // 10px ~ 35px
    s.style.fontSize=size+'px';
    s.style.color=`hsl(${Math.random()*360},100%,50%)`;
    s.style.opacity=0.75 + Math.random()*0.25; // 0.75 ~ 1
    document.body.appendChild(s);
    let dy=-1-Math.random()*4;
    const anim=setInterval(()=>{
        let y=parseFloat(s.style.top);
        s.style.top=y+dy+'px';
        if(y<-50){clearInterval(anim); s.remove();}
    },30);
}
setInterval(spawn,150);
</script>
</body>
</html>
