<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>ChatGPT自由發揮盲盒</title>
    <style>
        body { margin:0; overflow:hidden; background:#111; }
        .circle { position:absolute; border-radius:50%; opacity:0.8; }
    </style>
</head>
<body>
<script>
    const colors=['#ff0080','#00ffff','#ffff00','#ff8000','#80ff00','#ff00ff'];
    function spawnCircle(){
        const c=document.createElement('div');
        c.className='circle';
        const size=20+Math.random()*50;
        c.style.width=c.style.height=size+'px';
        c.style.left=Math.random()*window.innerWidth+'px';
        c.style.top=Math.random()*window.innerHeight+'px';
        c.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
        document.body.appendChild(c);
        let scale=1;
        const anim=setInterval(()=>{
            scale+=0.05;
            c.style.transform=`scale(${scale})`;
            c.style.opacity=1-scale*0.02;
            if(scale>15){clearInterval(anim); c.remove();}
        },30);
    }
    setInterval(spawnCircle,200);
</script>
</body>
</html>
