<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>ChatGPT自由發揮盲盒</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
div{position:absolute;width:20px;height:20px;border-radius:50%;}
</style>
</head>
<body>
<script>
function randomInt(max){return Math.floor(Math.random()*max);}
function spawn(){ 
    const d=document.createElement('div');
    d.style.background=`hsl(${randomInt(360)},100%,50%)`;
    d.style.left=randomInt(window.innerWidth)+'px';
    d.style.top=randomInt(window.innerHeight)+'px';
    document.body.appendChild(d);
    let dx=(Math.random()-0.5)*10, dy=(Math.random()-0.5)*10;
    const move=setInterval(()=>{
        let x=parseFloat(d.style.left), y=parseFloat(d.style.top);
        d.style.left=x+dx+'px'; d.style.top=y+dy+'px';
        if(x<0||x>window.innerWidth-20) dx=-dx;
        if(y<0||y>window.innerHeight-20) dy=-dy;
    },30);
}
setInterval(spawn,200);
</script>
</body>
</html>
